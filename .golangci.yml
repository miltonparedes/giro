version: "2"

linters:
  default: standard
  enable:
    - bodyclose
    - cyclop
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - misspell
    - nakedret
    - prealloc
    - revive
    - unconvert
    - unparam
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - goconst
          - gosec
          - unparam
      - path: internal/types/
        text: "avoid meaningless package names"
        linters:
          - revive
  settings:
    cyclop:
      max-complexity: 15
    gocyclo:
      min-complexity: 15

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/miltonparedes/giro

